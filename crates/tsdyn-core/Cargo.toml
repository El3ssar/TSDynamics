[package]
name = "tsdyn-core"
version = "0.1.0"
edition = "2021"
license = "MIT"
authors = ["Daniel Estevez"]
repository = "https://github.com/El3ssar/TSDynamics"
description = "TSDynamics PyO3 bindings: marshal numpy <-> slices, release the GIL, and build the `tsdynamics._rust` engine extension."

# Stream E7. This crate is the only one that knows about Python; it converts the
# F0 skeleton into the compiled extension. It is deliberately **outside** the
# `crates/` workspace (see the exclude note in `crates/Cargo.toml`): a pyo3
# `extension-module` cdylib cannot ride `cargo test --workspace` on a Python-free
# runner, so it keeps its own lockfile and is built by maturin/cargo here. The
# engine crates it drives are pulled in by path.
[lib]
name = "_rust"
# `cdylib` builds the importable extension; `rlib` lets `cargo test` build this
# crate's own unit tests (the pure-Rust bridge in `bridge.rs`).
crate-type = ["cdylib", "rlib"]

[dependencies]
# pyo3 WITHOUT `extension-module` by default: a plain `cargo build`/`cargo test`
# then links libpython normally so the bridge unit tests run. `maturin` (and the
# CI wheel build) turn on `extension-module` via the `extension-module` feature
# below, which suppresses the libpython link for the shipped `.so`. abi3-py312 â†’
# one wheel for CPython >= 3.12.
pyo3 = { version = "0.29", default-features = false, features = ["abi3-py312"] }
numpy = "0.29"

# The engine, by path (this crate is not a workspace member, so no `.workspace`).
# rayon reaches us transitively through tsdyn-engine, which owns the ensemble
# fan-out; this crate never calls it directly, so it is not a direct dependency.
#
# tsdyn-jit is a *direct* dependency (E-WIRE): the JIT bridge constructs a
# `JitEvaluator` here and dispatches it through the engine's `&dyn Evaluator`
# seam, so the Cranelift backend (pure Rust, no LLVM) enters the wheel build tree
# via this crate. It was correctly dropped from `tsdyn-engine` in #74 â€” the
# engine drives evaluators by trait and never names a concrete one.
tsdyn-ir = { path = "../tsdyn-ir" }
tsdyn-vm = { path = "../tsdyn-vm" }
tsdyn-jit = { path = "../tsdyn-jit" }
tsdyn-solvers = { path = "../tsdyn-solvers" }
tsdyn-engine = { path = "../tsdyn-engine" }

[features]
# Enabled by maturin (`[tool.maturin] features = ["extension-module"]`) when
# building the shipped extension; left OFF for `cargo test` so the unit-test
# harness links libpython and runs. Kept off the default set on purpose.
extension-module = ["pyo3/extension-module"]

# Release-profile tuning for the shipped wheel.
#
# This crate is the maturin build root (the project's `pyproject.toml` points
# `manifest-path` here) and is **excluded** from `crates/Cargo.toml`'s workspace,
# so it does NOT inherit any workspace `[profile.release]` â€” Cargo resolves the
# profile from the root manifest of whatever is being built, and for the wheel
# that root is *this* manifest. Without these keys the wheel built with cargo's
# defaults (`lto = false`, `codegen-units = 16`), which leaves the hot RK /
# interpreter loops in `tsdyn-vm` / `tsdyn-solvers` un-inlined across crate
# boundaries.
#
# `lto = "thin"` enables cross-crate inlining of the tape-evaluation and
# solver-step hot paths (thin LTO keeps build times reasonable vs. `"fat"`);
# `codegen-units = 1` gives the optimizer the whole crate as one unit. Both are
# the conventional release tuning for a tight numerical kernel. They affect ONLY
# the release build â€” `cargo test` (debug) is untouched â€” and are
# **answer-preserving**: LTO/codegen-unit changes alter only how the same
# floating-point operations are scheduled into machine code, never the IEEE-754
# result, so `interp == jit`, the golden fixtures, and the parallel==serial
# ensembles are unchanged.
[profile.release]
lto = "thin"
codegen-units = 1
