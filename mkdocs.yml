# =========================================================================
# TSDynamics documentation
# =========================================================================
# Phase-0 scaffold of the site rebuild: brand wiring + the new 8-tab
# information architecture. Each top-level tab points at its own index.md
# for now; the real per-section content (and the per-system generator) is
# rebuilt in later phases.
#
# Local preview:    .venv/bin/mkdocs serve
# Production build: .venv/bin/mkdocs build
# =========================================================================

site_name: TSDynamics
site_description: >-
  154 built-in dynamical systems, compiled integration, and a chaos-analysis
  toolkit for Python
site_url: https://el3ssar.github.io/TSDynamics/
site_author: Daniel Estevez

repo_name: El3ssar/TSDynamics
repo_url: https://github.com/El3ssar/TSDynamics
edit_uri: edit/main/docs/
copyright: >-
  Copyright &copy; 2024–2026 Daniel Estevez — MIT License

docs_dir: docs

theme:
  name: material
  custom_dir: docs/overrides
  language: en
  logo: assets/brand/logo/icon-on-dark.svg
  favicon: assets/brand/logo/favicon.svg
  icon:
    repo: fontawesome/brands/github
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - navigation.instant
    - navigation.tracking
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - search.highlight
    - search.suggest

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/El3ssar/TSDynamics
      name: TSDynamics on GitHub
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/tsdynamics/
      name: TSDynamics on PyPI

extra_css:
  - assets/brand/tokens.css
  - assets/brand/mkdocs/extra.css
  - assets/brand/mkdocs/figure-rail.css
  - assets/brand/mkdocs/systems.css
  - https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css

extra_javascript:
  - js/math.js
  - https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js
  - https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js

plugins:
  - search
  - glightbox:
      effect: zoom
      zoomable: true
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          inventories:
            - https://docs.python.org/3/objects.inv
            - https://numpy.org/doc/stable/objects.inv
            - https://docs.scipy.org/doc/scipy/objects.inv
          options:
            docstring_style: numpy
            docstring_section_style: spacy
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            show_signature_annotations: true
            signature_crossrefs: true
            separate_signature: true
            merge_init_into_class: true
            show_source: true
            show_bases: true
            members_order: source
            heading_level: 2
            filters:
              - "!^_"
              - "^__init__$"

# Build-time generator: the per-system + browser pages for the Systems tree,
# emitted as virtual files and patched into the nav (see hooks/docs_autogen.py).
hooks:
  - hooks/docs_autogen.py
  - hooks/citation_lint.py

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      title: On this page
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.betterem
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: El3ssar
      repo: TSDynamics

nav:
  - Home: index.md
  - Start:
      - start/index.md
  - Analysis:
      - analysis/index.md
      - "Integration & methods": analysis/integration-and-methods.md
  - Systems:
      - systems/index.md
  - Visualization:
      - visualization/index.md
  - Tutorials:
      - tutorials/index.md
  - References:
      - references/index.md
  - Project:
      - project/index.md

exclude_docs: |
  # tooling / non-page assets
  _tooling/
  _static/
  css/
  hero-preview.html
  # old content trees dropped from the new IA (rebuilt in later phases)
  theory/
  reference/
  transforms/
  contributing/
  # Phase 0 ships only the per-section index stubs; the old in-section
  # content pages are off-nav and rebuilt section by section in Phase 2.
  start/*.md
  !start/index.md
  analysis/*.md
  !analysis/index.md
  !analysis/integration-and-methods.md
  # The Systems tree is build-generated (hooks/docs_autogen.py emits the new
  # systems/<type>/<subcat>/ IA as virtual files + a fresh systems/index.md).
  # Only the dropped old physical stubs are excluded; the generated pages pass.
  systems/continuous/
  systems/delay/
  systems/discrete/
  visualization/*.md
  !visualization/index.md
  tutorials/*.md
  !tutorials/index.md
  project/*.md
  !project/index.md

validation:
  omitted_files: ignore
  absolute_links: ignore
  unrecognized_links: ignore
