[build-system]
requires = ["hatchling>=1.27.0", "hatch-vcs>=0.5.0"]
build-backend = "hatchling.build"

[project]
name = "tsdynamics"
dynamic = ["version"]
description = "Compiled ODE/DDE integration and Lyapunov analysis for dynamical systems."
readme = "README.md"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Daniel Estevez", email = "kemossabee@gmail.com" }]

keywords = [
  "dynamical systems",
  "ODE",
  "DDE",
  "chaos",
  "Lyapunov exponents",
  "nonlinear dynamics",
  "reservoir computing",
]

classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Science/Research",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Scientific/Engineering :: Mathematics",
  "Topic :: Scientific/Engineering :: Physics",
  "Typing :: Typed",
]

dependencies = [
  "numpy>=2.0,<3.0",
  "scipy>=1.14,<2.0",
  "matplotlib>=3.9,<4.0",
  "numba>=0.61,<0.62",
  "jitcdde>=1.8.3,<2.0",
  "jitcode>=1.7.3,<2.0",
  "symengine>=0.11,<1.0",
  "sympy>=1.12,<2.0",
  "pywavelets>=1.7,<2.0",
]

[project.urls]
Homepage = "https://github.com/El3ssar/TSDynamics"
Repository = "https://github.com/El3ssar/TSDynamics"
Issues = "https://github.com/El3ssar/TSDynamics/issues"

# ---------------- Dependency groups ----------------
[dependency-groups]
dev = [
  "pytest>=8.4,<9.0",
  "pytest-cov>=6.0,<7.0",
  "ruff==0.14.1",
  "mypy>=1.18,<2.0",
  "pydocstyle>=6.3,<7.0",
  "commitizen>=4.0,<5.0",
]
docs = [
  "sphinx>=8.0,<9.0",
  "myst-parser>=4.0,<5.0",
  "sphinx-autodoc-typehints>=2.0,<3.0",
  "furo>=2024.1.29,<2025.0",
]

# ---------------- Hatch ----------------
[tool.hatch.build]
include = ["src/tsdynamics/**", "README.md", "LICENSE*"]

[tool.hatch.build.targets.wheel]
packages = ["src/tsdynamics"]

[tool.hatch.build.targets.sdist]
include = ["src/tsdynamics/**", "README.md", "LICENSE*", "tests/**"]

[tool.hatch.version]
source = "vcs"

[tool.hatch.build.hooks.vcs]
version-file = "src/tsdynamics/_version.py"

# ---------------- Commitizen ----------------
[tool.commitizen]
tag_format = "v$version"
version_scheme = "semver2"
version_provider = "scm"
update_changelog_on_bump = true
changelog_incremental = true

# ---------------- Ruff ----------------
[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = ["src/tsdynamics/_version.py"]

[tool.ruff.lint]
select = ["E", "F", "I"]
ignore = ["E501", "ARG001", "F841"]

# ---------------- Pydocstyle ----------------
[tool.pydocstyle]
convention = "numpy"
add-ignore = ["D105", "D107"]
match = '.*\.py'
match-dir = '^src/'

# ---------------- Pytest ----------------
[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q --tb=short"
markers = [
  "slow: marks tests that compile JiTCODE/JiTCDDE C code or run long simulations (deselect with: pytest -m 'not slow')",
]

filterwarnings = [
  "ignore:.*Generating compiled integrator failed.*:UserWarning",
  "ignore:.*READ ME FIRST.*:UserWarning",
  "ignore:.*target time is smaller than the current time.*:UserWarning",
  "ignore:.*License classifiers have been superseded.*:UserWarning",
  "ignore:.*larger nsteps is needed.*:UserWarning",
  "ignore:.*step size becomes too small.*:UserWarning",
  "ignore:.*divide by zero encountered in divide.*:RuntimeWarning",
]
