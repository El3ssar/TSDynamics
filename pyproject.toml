[build-system]
requires = ["hatchling>=1.29.0", "hatch-vcs>=0.5.0"]
build-backend = "hatchling.build"

[project]
name = "tsdynamics"
dynamic = ["version"]
description = "Compiled ODE/DDE integration and Lyapunov analysis for dynamical systems."
readme = "README.md"
requires-python = ">=3.12,<4.0"
license = "MIT"
license-files = ["LICENSE*"]
authors = [{ name = "Daniel Estevez", email = "kemossabee@gmail.com" }]

keywords = [
  "dynamical systems",
  "ODE",
  "DDE",
  "chaos",
  "Lyapunov exponents",
  "nonlinear dynamics",
  "reservoir computing",
]

classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Science/Research",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Scientific/Engineering :: Mathematics",
  "Topic :: Scientific/Engineering :: Physics",
  "Typing :: Typed",
]

dependencies = [
  "numpy>=2.4,<3.0",
  "scipy>=1.17,<2.0",
  "numba>=0.65,<1.0",
  "jitcdde>=1.8,<2.0",
  "jitcode>=1.7,<2.0",
  "symengine>=0.14,<1.0",
  "sympy>=1.14,<2.0",
  "matplotlib>=3.10,<4.0",
  "pywavelets>=1.9,<2.0"
]

[project.urls]
Source = "https://github.com/El3ssar/TSDynamics"
Documentation = "https://github.com/El3ssar/TSDynamics#readme"
Issues = "https://github.com/El3ssar/TSDynamics/issues"
Changelog = "https://github.com/El3ssar/TSDynamics/blob/main/CHANGELOG.md"

# ── Dependency groups ──────────────────────────────────────────────────────────

[dependency-groups]
dev = [
  "pytest>=9.0,<10.0",
  "pytest-cov>=7.0,<8.0",
  "ruff>=0.15,<1.0",
  "mypy>=1.20,<2.0",
  "commitizen>=4.0,<5.0",
]
docs = [
  "sphinx>=9.0,<10.0",
  "myst-parser>=5.0,<6.0",
  "sphinx-autodoc-typehints>=3.0,<4.0",
  "furo>=2025.1,<2026.0",
]

# ── Hatch ──────────────────────────────────────────────────────────────────────

[tool.hatch.build]
include = ["src/tsdynamics/**", "README.md", "LICENSE*"]

[tool.hatch.build.targets.wheel]
packages = ["src/tsdynamics"]

[tool.hatch.build.targets.sdist]
include = ["src/tsdynamics/**", "README.md", "LICENSE*", "tests/**"]

[tool.hatch.version]
source = "vcs"

[tool.hatch.build.hooks.vcs]
version-file = "src/tsdynamics/_version.py"

# ── Commitizen ─────────────────────────────────────────────────────────────────

[tool.commitizen]
tag_format = "v$version"
version_scheme = "semver2"
version_provider = "scm"
update_changelog_on_bump = true
changelog_incremental = true

[tool.commitizen.change_type_map]
feat     = "Features"
fix      = "Bug Fixes"
perf     = "Performance"
refactor = "Refactoring"
docs     = "Documentation"
test     = "Tests"
ci       = "CI"

# ── Ruff ───────────────────────────────────────────────────────────────────────

[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = ["src/tsdynamics/_version.py"]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "SIM", "D"]
ignore = [
  "E501",    # line length — handled by formatter
  "D105",    # missing docstring in magic method
  "D107",    # missing docstring in __init__
  "B008",    # do not perform function calls in default args
  # ── Math-notation conventions (intentional) ─────────────────────────────
  "N803",    # argument name should be lowercase — Y, N, L are standard math notation
  "N805",    # first argument should be 'self' — false positive on @staticmethod/@staticjit
  "N806",    # variable in function should be lowercase — X, Y, N, L are math convention
  # ── Module/package docstrings (optional for math-system collections) ────
  "D100",    # missing docstring in public module
  "D104",    # missing docstring in public package
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["D", "S101"]   # no docstrings required in tests; allow assert
# ── Systems: math classes are self-documenting by name; intentional readability patterns ──
"src/tsdynamics/systems/**" = [
  "D101",    # missing docstring in public class — class names are the documentation
  "F841",    # local variable assigned but never used — intentional in _jac methods for visual symmetry
]

[tool.ruff.lint.isort]
known-first-party = ["tsdynamics"]

[tool.ruff.lint.pydocstyle]
convention = "numpy"

[tool.ruff.format]
quote-style   = "double"
indent-style  = "space"
line-ending   = "auto"

# ── Mypy ───────────────────────────────────────────────────────────────────────

[tool.mypy]
python_version        = "3.12"
strict                = true
ignore_missing_imports = true
exclude               = ["src/tsdynamics/_version.py"]

[[tool.mypy.overrides]]
module = ["numba.*", "jitcode.*", "jitcdde.*", "symengine.*", "pywt.*"]
ignore_missing_imports = true

# ── Coverage ───────────────────────────────────────────────────────────────────

[tool.coverage.run]
source = ["src/tsdynamics"]
omit   = ["src/tsdynamics/_version.py"]

[tool.coverage.report]
show_missing = true

# ── Pytest ─────────────────────────────────────────────────────────────────────

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts   = "-q --tb=short --strict-markers --cov=src/tsdynamics --cov-report=term-missing"
markers   = [
  "slow: marks tests that compile JiTCODE/JiTCDDE C code or run long simulations (deselect with: pytest -m 'not slow')",
]
filterwarnings = [
  "error",
  "ignore:.*Generating compiled integrator failed.*:UserWarning",
  "ignore:.*READ ME FIRST.*:UserWarning",
  "ignore:.*target time is smaller than the current time.*:UserWarning",
  "ignore:.*License classifiers have been superseded.*:UserWarning",
  "ignore:.*larger nsteps is needed.*:UserWarning",
  "ignore:.*step size becomes too small.*:UserWarning",
  "ignore:.*divide by zero encountered in divide.*:RuntimeWarning",
  # JiTCODE/JiTCDDE leave TemporaryDirectory objects to GC cleanup; harmless on Python 3.14+
  "ignore:.*Implicitly cleaning up.*TemporaryDirectory.*:ResourceWarning",
]