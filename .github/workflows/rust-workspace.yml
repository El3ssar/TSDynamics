name: Rust workspace

# Builds and lints the Rust engine workspace (crates/Cargo.toml — the tsdyn-*
# crates). Pure Rust: no Python toolchain needed. The pyo3 binding crate
# `tsdyn-core` is excluded from the workspace (it cannot link on a Python-free
# runner) and is built + tested by engine-bindings.yml instead.
on:
  pull_request:
    branches: [main]
    paths:
      - "crates/tsdyn-*/**"
      - "crates/Cargo.toml"
      - "crates/Cargo.lock"
      - ".github/workflows/rust-workspace.yml"
  workflow_dispatch:

concurrency:
  group: rust-workspace-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: crates

jobs:
  build-and-lint:
    name: Build + fmt + clippy (workspace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            crates/target
          key: cargo-workspace-${{ runner.os }}-${{ hashFiles('crates/Cargo.lock') }}

      - name: rustfmt
        run: cargo fmt --all --check

      - name: clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: build
        run: cargo build --workspace --locked

      # Added by stream F1: the IR contract ships round-trip / semantics tests
      # that must run in CI for `main` to be releasable. `--all-features` also
      # exercises the off-by-default `reference` evaluator. F4 can fold this into
      # the unified matrix.
      - name: test
        run: cargo test --workspace --all-features --locked
