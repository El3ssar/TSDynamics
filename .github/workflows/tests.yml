name: Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: "Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history (helps if SCM-driven versioning returns)

      - name: Install system build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      # Rust toolchain must be available BEFORE `uv sync`, because uv resolves
      # the project itself (which is now a maturin-backed package) and that
      # triggers a `cargo build` during the sync step.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            crates/target
          key: cargo-${{ runner.os }}-${{ hashFiles('crates/**/Cargo.toml', 'crates/**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('uv.lock') }}

      - name: Install project + dev dependencies
        run: uv sync --group dev

      - name: Build Rust extension into venv (editable, release profile)
        run: uv run maturin develop --release

      - name: Lint (Ruff)
        run: uv run ruff check src/

      - name: Format (Ruff)
        run: uv run ruff format --check src/

      - name: Run fast tests (no slow marker)
        run: uv run pytest -q --tb=short -m "not slow"

      - name: Run slow tests (JiT compilation + integration)
        run: uv run pytest -q --tb=short -m "slow"
