name: Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: "Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
            
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # hatch-vcs needs full tag history to determine version

      - name: Install system build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('uv.lock') }}

      - name: Install project + dev dependencies
        run: uv sync --group dev

      - name: Lint (ruff)
        run: uv run ruff check src/

      - name: Format (ruff)
        run: uv run ruff format --check src/

      - name: Run fast tests (no slow marker)
        run: uv run pytest -q --tb=short -m "not slow"

      - name: Run slow tests (JiT compilation + integration)
        run: uv run pytest -q --tb=short -m "slow"
