name: Perf (I-BENCH)

# Performance smoke + time-to-first-result tracking for the Rust engine
# (stream I-BENCH). Builds the `tsdynamics._rust` engine extension (exactly as
# engine-bindings.yml does) and runs the head-to-head benchmark in its CI-sized
# `--quick` mode across all three regimes (cold time-to-first-result, warm
# steady-state throughput, ensemble throughput) and every family
# (ODE / stiff / DDE / map / SDE).
#
# This job is a guardrail, not a gate: it asserts the benchmark *runs* against
# the real engine on every relevant change (so a regression that breaks the
# engine path or the harness is caught), prints the headline numbers to the run
# log, and uploads the raw results as an artifact. It deliberately does NOT fail
# on a slowdown threshold — wall-clock numbers on shared GitHub runners are too
# noisy to gate on. The committed, machine-pinned report lives in
# benches/REPORT.md; regenerate it locally with the full (non-quick) run.
on:
  pull_request:
    branches: [main]
    paths:
      - "benches/**"
      - "crates/tsdyn-core/**"
      - "crates/tsdyn-ir/**"
      - "crates/tsdyn-vm/**"
      - "crates/tsdyn-jit/**"
      - "crates/tsdyn-solvers/**"
      - "crates/tsdyn-engine/**"
      - "src/tsdynamics/engine/**"
      - "src/tsdynamics/families/**"
      - ".github/workflows/perf.yml"
  workflow_dispatch:

concurrency:
  group: perf-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  perf:
    name: Engine perf smoke + TTFR
    runs-on: ubuntu-latest
    env:
      MANIFEST: crates/tsdyn-core/Cargo.toml
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            crates/tsdyn-core/target
          key: cargo-tsdyn-core-${{ runner.os }}-${{ hashFiles('crates/tsdyn-core/Cargo.lock') }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install build deps (jitcode/jitcdde/numba v2 baselines)
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Sync project + dev deps
        run: uv sync --group dev

      - name: Locate the project interpreter
        run: echo "PYO3_PYTHON=$(uv run python -c 'import sys; print(sys.executable)')" >> "$GITHUB_ENV"

      # Build the engine extension into the source tree (same recipe as
      # engine-bindings.yml). Without this, interp/jit cannot be measured.
      - name: Build the engine extension
        run: cargo build --release --features extension-module --manifest-path "$MANIFEST" --locked

      - name: Install the extension into the source tree
        run: cp crates/tsdyn-core/target/release/lib_rust.so src/tsdynamics/_rust.abi3.so

      - name: Assert the engine extension is importable
        run: uv run python -c "import tsdynamics._rust; print('engine', tsdynamics._rust._version())"

      # The benchmark exits non-zero if the engine is not built (so a silently
      # broken interp/jit path fails the job), and prints the three-regime tables.
      - name: Run the engine benchmark (CI-sized)
        run: uv run python benches/bench_engine.py --quick --regime all --out perf-results.json | tee perf-summary.md

      # Surface the headline time-to-first-result (the I-BENCH first-class metric)
      # in the job log and step summary.
      - name: Report time-to-first-result
        run: |
          uv run python - <<'PY' | tee -a "$GITHUB_STEP_SUMMARY"
          import json
          d = json.load(open("perf-results.json"))
          cold = d.get("cold", {})
          print("### Cold time-to-first-result (s, fresh process, first integration)\n")
          print("| system | interp | jit |")
          print("|---|---|---|")
          for name, row in cold.items():
              def f(v):
                  return "—" if v is None else (v if isinstance(v, str) else f"{v:.3f}")
              print(f"| {name} | {f(row.get('interp'))} | {f(row.get('jit'))} |")
          PY

      - name: Upload raw perf results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-results
          path: |
            perf-results.json
            perf-summary.md
          if-no-files-found: warn
