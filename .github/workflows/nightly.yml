# Nightly exhaustive sweep: integrates EVERY built-in system on the Rust engine
# (pytest -m full). Too slow for PR CI.

name: Nightly full sweep

on:
  schedule:
    - cron: "17 3 * * *" # 03:17 UTC daily
  workflow_dispatch:

jobs:
  full-sweep:
    runs-on: ubuntu-latest
    # Hard cap so a pathological system fails the run in minutes instead of
    # hanging for the full 6-hour GitHub Actions ceiling.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # The engine is the sole integration backend, so the sweep needs the
      # compiled `tsdynamics._rust`; `uv sync` builds it via maturin (needs Rust).
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (2026-03-27)

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync project + dev deps (builds the engine)
        run: uv sync --group dev

      - name: Full sweep
        run: uv run pytest -m full --no-cov -q
