name: Rust core

# Builds the optional `tsdynamics-core` accelerator and runs the numeric
# kernel tests with it installed. The main test matrix (ci.yml) runs without
# the crate, so the gated tests skip there; this job is where they execute.
on:
  pull_request:
    branches: [main]
    paths:
      # Scoped to the v2 accelerator crate only (F4 CI matrix split). The v3
      # tsdyn-* workspace is covered by rust-workspace.yml, and the Rust-vs-v2
      # numeric compare by cross-validation.yml — an edit there no longer fires
      # this accelerator-build redundantly.
      - "crates/tsdynamics-core/**"
      - "src/tsdynamics/engine/rustcore.py"
      - "tests/test_rustcore*.py"
      - ".github/workflows/rust-core.yml"
  workflow_dispatch:

concurrency:
  group: rust-core-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build crate + numeric tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            crates/tsdynamics-core/target
          key: cargo-${{ runner.os }}-${{ hashFiles('crates/tsdynamics-core/Cargo.lock') }}

      - name: rustfmt
        run: cargo fmt --manifest-path crates/tsdynamics-core/Cargo.toml --check

      - name: clippy
        run: cargo clippy --manifest-path crates/tsdynamics-core/Cargo.toml --release -- -D warnings

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync project + dev deps
        run: uv sync --group dev

      - name: Build the accelerator wheel
        run: >-
          uv run --no-project --with maturin
          maturin build --release
          -m crates/tsdynamics-core/Cargo.toml
          --out crates/tsdynamics-core/dist

      - name: Install the accelerator into the project venv
        run: uv pip install crates/tsdynamics-core/dist/*.whl

      - name: Run Rust-core numeric tests
        run: uv run pytest tests/test_rustcore.py tests/test_rustcore_translation.py --no-cov -q
