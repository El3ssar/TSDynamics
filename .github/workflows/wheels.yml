name: Wheels

# Cross-platform prebuilt wheels for `tsdynamics` (post-M3: the Rust engine is the
# sole integration backend, so the package ships as ONE compiled maturin wheel —
# the pure-Python sources from `src/` + the `tsdynamics/_rust` abi3 extension).
# The extension is abi3 (cp312), so ONE wheel per (platform, arch) covers every
# CPython >= 3.12 — no per-version matrix.
#
# This workflow only *builds and verifies* wheels (uploaded as artifacts) for a
# packaging-shape PR smoke and on-demand builds. The release build + PyPI publish
# lives in release.yml (which owns the version tag and the OIDC trusted-publisher
# binding) — so this file deliberately does NOT trigger on tags and never
# publishes.
#
#   * pull_request (packaging paths only) → a cheap single-platform build smoke,
#     so a packaging-layout regression is caught before merge.
#   * workflow_dispatch                   → the full manylinux + musllinux + macOS
#     + Windows matrix + sdist (artifacts only).
on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/wheels.yml"
      - "pyproject.toml"
      - "crates/**"

concurrency:
  group: wheels-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  # Emit the build matrix: a one-platform smoke on PRs (the full matrix is heavy
  # and the cross-arch/macOS/Windows builds are standard maturin-action paths), the
  # full set on a manual run.
  matrix:
    name: Resolve build matrix
    runs-on: ubuntu-latest
    outputs:
      include: ${{ steps.set.outputs.include }}
    steps:
      - id: set
        shell: bash
        run: |
          full='[
            {"label":"linux-x86_64","runner":"ubuntu-latest","target":"x86_64","manylinux":"auto","native":true},
            {"label":"linux-aarch64","runner":"ubuntu-latest","target":"aarch64","manylinux":"auto","native":false},
            {"label":"musllinux-x86_64","runner":"ubuntu-latest","target":"x86_64","manylinux":"musllinux_1_2","native":false},
            {"label":"musllinux-aarch64","runner":"ubuntu-latest","target":"aarch64","manylinux":"musllinux_1_2","native":false},
            {"label":"macos-x86_64","runner":"macos-14","target":"x86_64","manylinux":"auto","native":false},
            {"label":"macos-aarch64","runner":"macos-14","target":"aarch64","manylinux":"auto","native":true},
            {"label":"windows-x64","runner":"windows-latest","target":"x64","manylinux":"auto","native":true}
          ]'
          smoke='[
            {"label":"linux-x86_64","runner":"ubuntu-latest","target":"x86_64","manylinux":"auto","native":true}
          ]'
          # Collapse to a single line for the matrix output.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            chosen=$(echo "$smoke" | tr -d '\n ')
          else
            chosen=$(echo "$full" | tr -d '\n ')
          fi
          echo "include=$chosen" >> "$GITHUB_OUTPUT"

  build:
    needs: matrix
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.matrix.outputs.include) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      # Build from the root pyproject: [tool.maturin] points manifest-path at the
      # engine crate and python-source at src/, so the wheel is the full
      # `tsdynamics` package + the `tsdynamics/_rust` abi3 extension.
      - name: Build wheel
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          target: ${{ matrix.target }}
          # manylinux is honoured on Linux only; ignored on macOS / Windows.
          manylinux: ${{ matrix.manylinux }}
          args: --release --out dist
          sccache: "true"

      # Per-artifact wheel-SHAPE smoke: inspect the freshly built wheel's zip
      # layout + WHEEL tag (no execution, so it runs on EVERY artifact — including
      # the cross-compiled aarch64 / musl wheels a native runner can't import).
      # `tests/test_packaging.py` reads `TSD_WHEEL` and asserts the wheel ships
      # `tsdynamics/_rust.*.so` inside the package, has no top-level `_rust`, and
      # carries the cp312-abi3 tag — a packaging-shape regression fails the build.
      - name: Verify the wheel shape (layout + abi3 tag)
        shell: bash
        run: |
          python -m pip install --upgrade pip pytest
          wheel=$(ls dist/tsdynamics-*.whl | head -n1)
          echo "Inspecting $wheel"
          # The wheel-content checks read the zip only — no numpy/tsdynamics import.
          # `--noconftest` skips tests/conftest.py (it imports numpy + tsdynamics at
          # collection; neither is installed in this build-only env), and `-k wheel`
          # selects exactly the three `test_wheel_*` content invariants.
          TSD_WHEEL="$wheel" python -m pytest tests/test_packaging.py \
            -k wheel --noconftest -p no:cacheprovider -o addopts="" -q

      # Install the freshly built wheel and import it. Only on native runners: a
      # cross-compiled aarch64 wheel (or a musl wheel on a glibc host) cannot run
      # here. The runtime deps (numpy/scipy/symengine/sympy) come from the index;
      # the engine wheel itself resolves under --find-links.
      - name: Verify the wheel imports + integrates
        if: ${{ matrix.native }}
        shell: bash
        run: |
          python -m pip install --find-links dist tsdynamics
          python -c "import tsdynamics as ts, tsdynamics._rust; t = ts.Lorenz().integrate(final_time=5.0, dt=0.01); assert t.meta['engine'] == 'rust'; print('tsdynamics wheel import + integrate OK on ${{ matrix.label }}')"

      - name: Upload wheel
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: wheels-${{ matrix.label }}
          path: dist/*.whl
          if-no-files-found: error

  sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # The sdist vendors the sibling path-dependency crates (tsdyn-ir/vm/jit/
      # solvers/engine), so it is self-contained and buildable from source.
      - name: Build sdist
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          command: sdist
          args: --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: wheels-sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  # Single stable status check to gate merges on (mirrors ci.yml's ci-summary).
  wheels-summary:
    name: Wheels summary
    if: always()
    # `matrix` is included so a matrix-resolution failure (which would *skip*
    # `build`, not fail it) cannot slip through as a green merge check.
    needs: [matrix, build, sdist]
    runs-on: ubuntu-latest
    steps:
      - name: Gate on the build jobs
        run: |
          echo "matrix=${{ needs.matrix.result }} build=${{ needs.build.result }} sdist=${{ needs.sdist.result }}"
          for r in "${{ needs.matrix.result }}" "${{ needs.build.result }}" "${{ needs.sdist.result }}"; do
            case "$r" in
              failure|cancelled)
                echo "::error::a wheels job did not pass ($r)"
                exit 1
                ;;
            esac
          done
          echo "Wheels OK — built or legitimately skipped."
