name: CI

# PR gate: lint + tests, made fast in three ways.
#
#  1. SCOPE-AWARE at the workflow level — the Python jobs only run when Python,
#     test, or engine-crate code changes (post-M3 the Rust engine is the sole
#     integration backend, so a `crates/**` change affects the suite). Docs-only
#     PRs skip them entirely.
#
#  2. CHANGE-SCOPED at the test level — `pytest --changed` (tests/_changed_select.py)
#     narrows each run to the tests the PR diff can actually affect: touch one
#     system → only that system's registry sweep; touch one analysis area → that
#     area's tests; a FOUNDATIONAL change (engine/solver/family/data/utils layers,
#     the registry, a lockfile, any crate, any workflow) falls back to the full
#     tier. The complete suite still runs on every push to main (release.yml) and
#     nightly (-m full), so a mis-scoped selection can only delay catching a
#     regression, never ship it.
#
#  3. BUILD-ONCE + PARALLEL — the abi3 engine wheel is compiled once per OS (it is
#     cp312-abi3, so one wheel covers every CPython >= 3.12) and shared to the test
#     matrix as an artifact, instead of `uv sync` recompiling it in all four cells;
#     the tests then run under `pytest -n auto` (pytest-xdist).
#
# The always-on "CI summary" job is the single stable check to gate merges on: it
# is green when every required job either passed or was skipped (out-of-scope).
on:
  pull_request:
    branches: [main]

# Cancel superseded runs on the same PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  # Detect what changed so we can skip out-of-scope work entirely.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        id: filter
        with:
          filters: |
            python:
              - 'src/**'
              - 'tests/**'
              - 'crates/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/workflows/ci.yml'
        # Post-M3 the Rust engine IS load-bearing for the Python suite (it is the
        # sole integration backend), so a `crates/**` change must run the Python
        # tests too — the engine wheel is rebuilt before they run.

  lint:
    name: Lint (ruff)
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      # Lint needs only ruff, not the compiled engine — skip the project build
      # (which would otherwise pull in the Rust toolchain via maturin).
      - name: Sync dev deps (locked ruff — matches local results)
        run: uv sync --no-install-project --group dev

      - name: ruff check
        run: uv run --no-sync ruff check src/ tests/

      - name: ruff format --check
        run: uv run --no-sync ruff format --check src/ tests/

  typecheck:
    name: Typecheck (mypy --strict)
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      # mypy is static: it reads src/ directly and resolves third-party stubs from
      # the installed deps — no engine build (the abi3 wheel) is needed, so skip
      # installing the project itself (as the lint job does).
      - name: Sync deps (no engine build)
        run: uv sync --no-install-project --group dev

      - name: mypy --strict
        run: uv run --no-sync mypy --strict src/tsdynamics

  # Compile the abi3 engine wheel ONCE per OS. It is cp312-abi3, so a single wheel
  # serves both Python 3.12 and 3.13 on that OS — the test matrix below downloads
  # it instead of every cell recompiling the Rust engine via `uv sync`.
  build-engine:
    name: Build engine wheel (${{ matrix.label }})
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, label: linux }
          - { os: macos-latest, label: macos }
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      # Build from the root pyproject ([tool.maturin] points manifest-path at the
      # engine crate and python-source at src/), exactly as release.yml/wheels.yml
      # do — so the artifact is the real packaged wheel, not a hand-copied .so.
      - name: Build abi3 wheel
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          args: --release --out dist
          manylinux: auto
          sccache: "false"

      - name: Upload engine wheel
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: engine-wheel-${{ matrix.label }}
          path: dist/*.whl
          if-no-files-found: error

  test-fast:
    name: Fast tests (Py ${{ matrix.python }}, ${{ matrix.os }})
    needs: [changes, build-engine]
    if: needs.changes.outputs.python == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, python: "3.12", engine: linux }
          - { os: ubuntu-latest, python: "3.13", engine: linux }
          - { os: macos-latest, python: "3.12", engine: macos }
          - { os: macos-latest, python: "3.13", engine: macos }
    steps:
      # Full history + the PR base, so `pytest --changed` can diff against it.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Fetch the PR base for the diff
        run: git fetch --no-tags origin "${{ github.event.pull_request.base.ref }}"

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}

      # Install deps + dev tools, but NOT the project (no engine recompile).
      - name: Sync deps (no engine build)
        run: uv sync --no-install-project --group dev --python ${{ matrix.python }}

      - name: Download the prebuilt engine wheel
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: engine-wheel-${{ matrix.engine }}
          path: dist

      - name: Install the engine wheel
        run: uv pip install --no-deps dist/*.whl

      # Fail loudly if the wheel did not actually load — otherwise the suite would
      # silently `importorskip` the engine and report green.
      - name: Assert the engine is importable
        run: uv run --no-sync python -c "import tsdynamics._rust; print('tsdynamics._rust loaded OK')"

      - name: Change-scoped fast tests (parallel)
        env:
          TSD_CHANGED_BASE: origin/${{ github.event.pull_request.base.ref }}
        run: uv run --no-sync pytest --changed -m "not slow and not full" --no-cov -n auto -q

  test-slow:
    name: Slow tests (Py 3.12, ubuntu)
    needs: [changes, build-engine]
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Fetch the PR base for the diff
        run: git fetch --no-tags origin "${{ github.event.pull_request.base.ref }}"

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync deps (no engine build)
        run: uv sync --no-install-project --group dev

      - name: Download the prebuilt engine wheel
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: engine-wheel-linux
          path: dist

      - name: Install the engine wheel
        run: uv pip install --no-deps dist/*.whl

      - name: Assert the engine is importable
        run: uv run --no-sync python -c "import tsdynamics._rust; print('tsdynamics._rust loaded OK')"

      # The slow tier (long simulations + Rust comparisons) runs on ONE cell only,
      # change-scoped: a foundational change runs all of it, a one-system change
      # runs just that system's slow cases.
      - name: Change-scoped slow tests (parallel)
        env:
          TSD_CHANGED_BASE: origin/${{ github.event.pull_request.base.ref }}
        run: uv run --no-sync pytest --changed -m "slow and not full" --no-cov -n auto -q

  # The cross-backend styling/honoring contract (tests/test_viz_honoring_contract.py)
  # gates the matplotlib + plotly renderers, but those are OPTIONAL extras
  # (`viz`/`interactive`) that the other lanes deliberately omit — so on the default
  # lanes the per-backend honoring probes `importorskip` and the contract is never
  # enforced. This lane installs the viz extras and runs the FULL viz suite
  # un-scoped, so an `honored_by` overclaim cannot ship green on a viz-touching PR.
  test-viz:
    name: Viz tests (mpl+plotly extras, Py 3.12)
    needs: [changes, build-engine]
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync deps + viz extras (no engine build)
        run: uv sync --no-install-project --group dev --extra viz --extra interactive

      - name: Download the prebuilt engine wheel
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: engine-wheel-linux
          path: dist

      - name: Install the engine wheel
        run: uv pip install --no-deps dist/*.whl

      - name: Assert the engine + viz backends are importable
        run: uv run --no-sync python -c "import tsdynamics._rust, matplotlib, plotly; print('engine + mpl + plotly OK')"

      - name: Viz + styling suites (matplotlib + plotly present)
        env:
          MPLBACKEND: Agg
        run: >
          uv run --no-sync pytest
          tests/test_viz*.py tests/test_plotspec*.py tests/test_to_plot_spec.py
          tests/test_plot_accessor_kinds.py tests/test_renderers_registry.py
          --no-cov -n auto -q

  # Single stable status check to require for merge. Green iff every required job
  # passed OR was skipped (out-of-scope). Fails if any failed or was cancelled.
  # Configure branch protection (if any) to require ONLY this check.
  ci-summary:
    name: CI summary
    if: always()
    needs: [changes, lint, typecheck, build-engine, test-fast, test-slow, test-viz]
    runs-on: ubuntu-latest
    steps:
      - name: Gate on required jobs
        run: |
          echo "changes=${{ needs.changes.result }} lint=${{ needs.lint.result }} typecheck=${{ needs.typecheck.result }} build-engine=${{ needs.build-engine.result }} test-fast=${{ needs.test-fast.result }} test-slow=${{ needs.test-slow.result }} test-viz=${{ needs.test-viz.result }}"
          for r in "${{ needs.changes.result }}" "${{ needs.lint.result }}" "${{ needs.typecheck.result }}" "${{ needs.build-engine.result }}" "${{ needs.test-fast.result }}" "${{ needs.test-slow.result }}" "${{ needs.test-viz.result }}"; do
            case "$r" in
              failure|cancelled)
                echo "::error::a required job did not pass ($r)"
                exit 1
                ;;
            esac
          done
          echo "CI OK — passed or skipped (skips are expected for out-of-scope changes)."
