name: CI

# PR gate: lint + tests, but SCOPE-AWARE — the Python lint/test matrix only runs
# when Python, test, or engine-crate code changes (post-M3 the Rust engine is the
# sole integration backend, so a `crates/**` change affects the suite). Docs-only
# PRs skip it. The always-on "CI summary" job is the single stable check to gate
# merges on: it is green when every required job either passed or was skipped.
on:
  pull_request:
    branches: [main]

# Cancel superseded runs on the same PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  # Detect what changed so we can skip out-of-scope work.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - 'src/**'
              - 'tests/**'
              - 'crates/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/workflows/ci.yml'
        # Post-M3 the Rust engine IS load-bearing for the Python suite (it is the
        # sole integration backend), so a `crates/**` change must run the Python
        # tests too — `uv sync` builds the engine via maturin before they run.

  lint:
    name: Lint (ruff)
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      # Lint needs only ruff, not the compiled engine — skip the project build
      # (which would otherwise pull in the Rust toolchain via maturin).
      - name: Sync dev deps (locked ruff — matches local results)
        run: uv sync --no-install-project --group dev

      - name: ruff check
        run: uv run ruff check src/ tests/

      - name: ruff format --check
        run: uv run ruff format --check src/ tests/

  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      # The engine is the sole integration backend post-M3, so the suite needs
      # the compiled `tsdynamics._rust`. `uv sync` builds it through maturin,
      # which needs a Rust toolchain.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync project + dev deps (builds the engine)
        run: uv sync --group dev

      - name: Run fast tests
        run: uv run pytest -m "not slow and not full" --no-cov -q

      - name: Run full test suite
        run: uv run pytest --cov=src/tsdynamics --cov-report=xml

      - name: Upload coverage (Linux + Python 3.12 only)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        continue-on-error: true

  # Single stable status check to require for merge. Green iff every required
  # job passed OR was skipped (out-of-scope). Fails if any of them failed or was
  # cancelled. Configure branch protection (if any) to require ONLY this check.
  ci-summary:
    name: CI summary
    if: always()
    needs: [changes, lint, test]
    runs-on: ubuntu-latest
    steps:
      - name: Gate on required jobs
        run: |
          echo "changes=${{ needs.changes.result }} lint=${{ needs.lint.result }} test=${{ needs.test.result }}"
          for r in "${{ needs.changes.result }}" "${{ needs.lint.result }}" "${{ needs.test.result }}"; do
            case "$r" in
              failure|cancelled)
                echo "::error::a required job did not pass ($r)"
                exit 1
                ;;
            esac
          done
          echo "CI OK — passed or skipped (skips are expected for out-of-scope changes)."
