name: CI

# PR gate: lint + tests, but SCOPE-AWARE — the Python lint/test matrix only runs
# when Python or test code actually changes. Docs-only or Rust-only PRs skip it
# (Rust is covered by rust-core.yml, which is itself path-scoped). The always-on
# "CI summary" job is the single stable check to gate merges on: it is green when
# every required job either passed or was legitimately skipped.
on:
  pull_request:
    branches: [main]

# Cancel superseded runs on the same PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  # Detect what changed so we can skip out-of-scope work.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - 'src/**'
              - 'tests/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/workflows/ci.yml'
        # NOTE: the Rust crate (crates/**) is intentionally NOT here — it has no
        # effect on the pure-Python test suite today and is validated by
        # rust-core.yml. Revisit when the Rust engine becomes load-bearing for
        # Python (ROADMAP stream I-XVAL / milestone M3).

  lint:
    name: Lint (ruff)
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dev deps (locked ruff — matches local results)
        run: uv sync --group dev

      - name: ruff check
        run: uv run ruff check src/ tests/

      - name: ruff format --check
        run: uv run ruff format --check src/ tests/

  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install build deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Sync project + dev deps
        run: uv sync --group dev

      - name: Run fast tests
        run: uv run pytest -m "not slow and not full" --no-cov -q

      - name: Run full test suite
        run: uv run pytest --cov=src/tsdynamics --cov-report=xml

      - name: Upload coverage (Linux + Python 3.12 only)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        continue-on-error: true

  # Single stable status check to require for merge. Green iff every required
  # job passed OR was skipped (out-of-scope). Fails if any of them failed or was
  # cancelled. Configure branch protection (if any) to require ONLY this check.
  ci-summary:
    name: CI summary
    if: always()
    needs: [changes, lint, test]
    runs-on: ubuntu-latest
    steps:
      - name: Gate on required jobs
        run: |
          echo "changes=${{ needs.changes.result }} lint=${{ needs.lint.result }} test=${{ needs.test.result }}"
          for r in "${{ needs.changes.result }}" "${{ needs.lint.result }}" "${{ needs.test.result }}"; do
            case "$r" in
              failure|cancelled)
                echo "::error::a required job did not pass ($r)"
                exit 1
                ;;
            esac
          done
          echo "CI OK — passed or skipped (skips are expected for out-of-scope changes)."
