# Documentation: build on every PR and push to main (validation),
# deploy to GitHub Pages only on push to main.
#
# System figures are rendered at build time by hooks/docs_autogen.py with an
# on-disk cache (.cache/docs-figures) keyed by class-source hashes, restored
# via actions/cache so only new/changed systems re-render.

name: Documentation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    # Only validate docs when something doc-relevant changes; an out-of-scope PR
    # would otherwise recompile the Rust engine (uv sync + maturin) for nothing.
    # The push-to-main trigger above stays unscoped so deploys always run.
    paths:
      - "docs/**"
      - "src/tsdynamics/**"
      - "mkdocs.yml"
      - "hooks/**"
      - "pyproject.toml"
      - ".github/workflows/docs.yml"

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

env:
  DISABLE_MKDOCS_2_WARNING: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      # The docs import `tsdynamics` (autogen pages, figures), so the build needs
      # the compiled engine; `uv sync` builds it via maturin (needs Rust).
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore figure cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .cache/docs-figures
          key: docs-figures-${{ hashFiles('src/tsdynamics/systems/**', 'docs/_tooling/**') }}
          restore-keys: |
            docs-figures-

      - name: Sync project + docs deps
        run: uv sync --group docs

      - name: Build documentation
        run: uv run mkdocs build --strict

      - name: Upload site artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: site
          path: site/
          retention-days: 3

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: docs-deploy
      cancel-in-progress: false
    steps:
      - name: Download site artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: site
          path: site

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          force_orphan: true
