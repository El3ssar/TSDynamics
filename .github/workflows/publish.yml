name: Publish to PyPI

on:
  push:
    tags:
      - "v[0-9]*"  # matches v0.1.0, v1.2.3, etc.

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # hatch-vcs needs full tag history

      - name: Install system build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential python3-dev

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: uv build

      - name: Verify distributions
        run: |
          ls -lh dist/
          uv run --with twine twine check dist/*

      - name: Upload distributions as artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/tsdynamics/
    permissions:
      id-token: write  # required for OIDC Trusted Publisher auth

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
