# Release pipeline: every push to main runs the test suite, then
# python-semantic-release decides from the conventional commit messages
# whether a release is due. If so it bumps __version__, commits, tags
# vX.Y.Z, creates the GitHub release, and publishes to PyPI via OIDC
# trusted publishing.
#
# PyPI trusted publishing is bound to THIS filename and the "pypi"
# environment — do not rename either without re-registering on PyPI:
#   owner = El3ssar, repository = TSDynamics,
#   workflow = release.yml, environment = pypi

name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Sync project + dev deps
        run: uv sync --group dev

      - name: Lint
        run: |
          uv run ruff check src/ tests/
          uv run ruff format --check src/ tests/

      - name: Tests
        run: uv run pytest --no-cov -q

  release:
    needs: test
    if: github.repository == 'El3ssar/TSDynamics'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          # PSR needs the full tag history to compute the next version.
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Semantic release (version, tag, GitHub release, build)
        id: semrel
        uses: python-semantic-release/python-semantic-release@v10
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Attach build artifacts to the GitHub release
        if: steps.semrel.outputs.released == 'true'
        uses: python-semantic-release/publish-action@v10
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ steps.semrel.outputs.tag }}

      - name: Publish to PyPI
        if: steps.semrel.outputs.released == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
