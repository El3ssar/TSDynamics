# Release pipeline (post-M3: one compiled maturin wheel per platform).
#
# Automated path (push to main):
#   1. test    — build the Rust engine + run the suite (the publish gate).
#   2. release — python-semantic-release reads the conventional commits, and if a
#                release is due bumps the version (pyproject + __init__.py),
#                commits, tags vX.Y.Z, and creates the GitHub Release. It does
#                NOT build (build_command="") — the wheel is compiled, so it is
#                built per-platform below, not by PSR.
#   3. wheels  — build the abi3 wheel for every (platform, arch) + an sdist, from
#                the tag PSR just created (so the wheel carries the bumped
#                version, not the pre-bump source the run was triggered on).
#   4. publish — upload every wheel + the sdist to PyPI via OIDC trusted
#                publishing, and attach them to the GitHub Release.
#
# Manual path (workflow_dispatch with `publish_tag`): (re)build the wheels + sdist
# for an already-tagged release and publish them to PyPI, without re-running PSR.
# Use it to finish a release whose wheel build was interrupted (e.g. a starved
# macOS runner) or whose publish failed (e.g. the trusted publisher was not yet
# registered). It runs the same build+publish jobs as the auto path.
#
# PyPI trusted publishing is bound to THIS filename and the "pypi" environment —
# do not rename either without re-registering on PyPI:
#   owner = El3ssar, repository = TSDynamics,
#   workflow = release.yml, environment = pypi

name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish_tag:
        description: "Build + publish this existing tag to PyPI (e.g. v3.0.0). Leave blank for a normal release run."
        required: false
        default: ""

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  test:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      # `uv sync` builds the project with maturin, which compiles the engine
      # extension into the venv — the suite needs the compiled `tsdynamics._rust`.
      - name: Sync project + dev deps (builds the engine)
        run: uv sync --group dev

      - name: Lint
        run: |
          uv run ruff check src/ tests/
          uv run ruff format --check src/ tests/

      # The full suite on the authoritative main commit — NOT change-scoped — so
      # this is where coverage is measured (the PR jobs run a selected subset and
      # deliberately skip --cov). Codecov upload is best-effort.
      - name: Tests (full suite + coverage)
        run: uv run pytest --cov=src/tsdynamics --cov-report=xml -q

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        continue-on-error: true

  release:
    needs: test
    if: github.event_name == 'push' && github.repository == 'El3ssar/TSDynamics'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      released: ${{ steps.semrel.outputs.released }}
      tag: ${{ steps.semrel.outputs.tag }}
      version: ${{ steps.semrel.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          # PSR needs the full tag history AND an attached branch (it commits the
          # version bump back) — do not pin ref to a sha (detached HEAD).
          fetch-depth: 0

      - name: Semantic release (version, tag, GitHub release — no build)
        id: semrel
        uses: python-semantic-release/python-semantic-release@v10
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

  # Single gate that drives the build + publish for BOTH paths: a fresh
  # auto-release (push to main, PSR cut a version) OR a manual recovery
  # (workflow_dispatch with `publish_tag`, e.g. to finish a release whose wheel
  # build was interrupted). Resolves the tag to build/publish from either source.
  resolve:
    needs: release
    if: >-
      always() &&
      (needs.release.outputs.released == 'true' ||
       (github.event_name == 'workflow_dispatch' && inputs.publish_tag != ''))
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ needs.release.outputs.tag || inputs.publish_tag }}
    steps:
      - run: echo "Building + publishing ${{ needs.release.outputs.tag || inputs.publish_tag }}"

  wheels:
    needs: resolve
    # Explicit gate keyed off resolve's own result. On the dispatch recovery
    # path the `release` job is skipped; without a status function in this `if`
    # GitHub silently ANDs `success()` onto it, which inherits that skip
    # transitively (through resolve) and skips the whole build. The leading
    # `always()` suppresses the implicit `success()`; the result check then
    # enforces that resolve actually succeeded.
    if: ${{ always() && needs.resolve.result == 'success' }}
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { label: linux-x86_64, runner: ubuntu-latest, target: x86_64, manylinux: auto }
          - { label: linux-aarch64, runner: ubuntu-latest, target: aarch64, manylinux: auto }
          - { label: musllinux-x86_64, runner: ubuntu-latest, target: x86_64, manylinux: musllinux_1_2 }
          - { label: musllinux-aarch64, runner: ubuntu-latest, target: aarch64, manylinux: musllinux_1_2 }
          # macOS x86_64 is CROSS-COMPILED on a macos-14 (ARM) runner — the
          # `macos-13` (Intel) pool is being retired and starves the queue. The
          # extension is abi3 and links no libpython/C deps, so the cross build is
          # clean; it is import-verified on a native x86_64 host elsewhere.
          - { label: macos-x86_64, runner: macos-14, target: x86_64, manylinux: auto }
          - { label: macos-aarch64, runner: macos-14, target: aarch64, manylinux: auto }
          - { label: windows-x64, runner: windows-latest, target: x64, manylinux: auto }
    steps:
      # Check out the *tag* (PSR's new tag, or the dispatched publish_tag) so the
      # built wheel carries the released version, not the pre-bump commit.
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve.outputs.tag }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # Build from the root pyproject ([tool.maturin] points manifest-path at the
      # engine crate and python-source at src/, so this ships the full
      # `tsdynamics` package + the `tsdynamics/_rust` abi3 extension as one wheel).
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --out dist
          sccache: "false" # clean rebuilds for a release

      - name: Upload wheel
        uses: actions/upload-artifact@v6
        with:
          name: dist-${{ matrix.label }}
          path: dist/*.whl
          if-no-files-found: error

  sdist:
    needs: resolve
    # Same transitive-skip guard as `wheels` (see note there).
    if: ${{ always() && needs.resolve.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve.outputs.tag }}

      # The sdist vendors the sibling path-dependency crates (tsdyn-ir/vm/jit/
      # solvers/engine), so it is self-contained and buildable from source.
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@v6
        with:
          name: dist-sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  publish:
    needs: [resolve, wheels, sdist]
    # Gate on the direct deps' results. The leading `always()` suppresses the
    # implicit `success()` that the skipped `release` ancestor would otherwise
    # poison on the dispatch path (see the `wheels` note).
    if: ${{ always() && needs.wheels.result == 'success' && needs.sdist.result == 'success' }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write # attach artifacts to the GitHub Release
      id-token: write # OIDC trusted publishing
    steps:
      - name: Collect every wheel + the sdist
        uses: actions/download-artifact@v6
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true

      - name: Show what will be published
        run: ls -l dist

      - name: Attach artifacts to the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.resolve.outputs.tag }}" dist/* --clobber --repo "${{ github.repository }}"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # A recovery re-run may re-upload an already-published file; don't fail.
          skip-existing: true
