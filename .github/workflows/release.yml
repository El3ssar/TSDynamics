name: Release

# Triggered by pushing a SemVer tag (e.g. `v0.3.0`).
# Builds sdist + wheel with hatch-vcs and publishes to PyPI via Trusted
# Publishing (OIDC) — no API tokens stored as secrets.
#
# One-time PyPI setup:
#   1. Create the project on https://pypi.org once (or claim the name).
#   2. In project settings → Publishing → "Add a new pending publisher":
#        owner          = El3ssar
#        repository     = TSDynamics
#        workflow name  = release.yml
#        environment    = pypi
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # hatch-vcs needs tags / full history

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.12

      - name: Build distributions
        run: uvx --from "hatch>=1.13" hatch build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/tsdynamics/
    permissions:
      id-token: write   # required for PyPI Trusted Publishing (OIDC)
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # No `password:` — Trusted Publishing handles auth via OIDC.
          packages-dir: dist/

  github-release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub release with notes
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: dist/*
